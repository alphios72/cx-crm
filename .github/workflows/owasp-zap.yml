name: OWASP ZAP Security Scan

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the web application

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d
          echo "Waiting for database to start..."
          sleep 10
          if ! docker compose exec -T -u root app npx tsx -e "import { PrismaClient } from '@prisma/client'; new PrismaClient().pipelineStage.count().then(()=>process.exit(0)).catch(()=>process.exit(1));"; then
            echo "Database empty or missing tables. Pushing schema and seeding..."
            docker compose exec -T -u root app sh -c "npx prisma@5.22.0 db push --accept-data-loss --skip-generate && npx prisma@5.22.0 db seed"
          else
            echo "Database already initialized."
          fi
          echo "Waiting for the application to become ready..."
          timeout 300 bash -c '
            while true; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" localhost:3000 || echo "curl_failed")
              echo "Healthcheck returned: $CODE"
              if [[ "$CODE" == "200" || "$CODE" == "302" || "$CODE" == "307" || "$CODE" == "401" ]]; then
                break
              fi
              sleep 5
            done
          ' || (docker compose logs && exit 1)
          echo "Application is up!"

      - name: Get network IP
        id: ip
        run: echo "IP=$(hostname -I | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: "http://${{ steps.ip.outputs.IP }}:3000"
          cmd_options: '-a'
          allow_issue_writing: false
